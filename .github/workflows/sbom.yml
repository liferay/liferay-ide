name: SBOM

on:
  push:
    branches:
      - master
    paths-ignore:
      - '*.commits'
      - '*.markdown'
      - '**/*.markdown'

env:
  LC_ALL: en_US.UTF-8

jobs:
  GenerateSBOM:
    if: (github.repository == 'liferay/liferay-ide')
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout liferay-ide
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu'
          cache: maven
      - name: Build repository
        shell: bash
        run: |
          ./mvnw clean package -DskipTests
      - name: Generate SBOM
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          ./generate-p2-sbom.sh --output "p2-sbom-${SHORT_SHA}.cdx.json"
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: p2-sbom
          path: p2-sbom-*.cdx.json
          retention-days: 90
